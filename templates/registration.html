<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
</head>
<body>
    <form id="registration-form" action="{{ url_for('register_bp.register') }}" method="post">
        <input type="text" id="name" placeholder="Enter your name" required/>
        <input type="email" id="email" placeholder="Enter your email" required/>
        <input type="password" id="password" placeholder="Enter your password" required/>
        <button type="submit">Register</button>
    </form>

    <div id="message"></div>

    <button onclick="window.location.href='{{ url_for('main_page') }}'">Back</button>

    <script src="{{ url_for('static', filename='register_script.js') }}"></script>
</body>
</html>
